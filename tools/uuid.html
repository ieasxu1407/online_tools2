<script>
/* ===========================
   UUID v4 생성
=========================== */

function createUUID() {

    if (window.crypto && crypto.randomUUID) {
        return crypto.randomUUID();
    }

    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, function(c) {

        const r = Math.random() * 16 | 0;
        const v = c === "x" ? r : (r & 0x3 | 0x8);

        return v.toString(16);

    });

}

/* ===========================
   UUID 생성
=========================== */

document.getElementById("generateBtn").addEventListener("click", function () {

    const count = Number(document.getElementById("uuidCount").value);

    const upper = document.getElementById("upperCase").checked;
    const remove = document.getElementById("removeHyphen").checked;
    const braces = document.getElementById("addBraces").checked;
    const save = document.getElementById("saveHistory").checked;

    output.textContent = "";

    historyList = [];
    historyIndex = 1;
    historyTable.innerHTML = "";

    for(let i=0;i<count;i++){

        let uuid = createUUID();

        if(remove)
            uuid = uuid.replace(/-/g,"");

        if(upper)
            uuid = uuid.toUpperCase();

        if(braces)
            uuid = "{" + uuid + "}";

        historyList.push(uuid);

        addHistory(uuid);

    }

    output.textContent = historyList.join("\n");

    updateProgress(100,"생성 완료");

    if(save){

        localStorage.setItem(
            "uuidHistory",
            JSON.stringify(historyList)
        );

    }

});

/* ===========================
   복사
=========================== */

document.getElementById("copyBtn").addEventListener("click",function(){

    if(historyList.length===0){

        alert("생성된 UUID가 없습니다.");

        return;

    }

    navigator.clipboard.writeText(historyList.join("\n"));

    alert("클립보드에 복사되었습니다.");

});

/* ===========================
   TXT 저장
=========================== */

document.getElementById("downloadTxtBtn").addEventListener("click",function(){

    if(historyList.length===0){

        alert("저장할 UUID가 없습니다.");

        return;

    }

    const blob = new Blob(
        [historyList.join("\n")],
        {type:"text/plain;charset=utf-8"}
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;
    a.download = "uuid.txt";

    a.click();

    URL.revokeObjectURL(url);

});

/* ===========================
   CSV 저장
=========================== */

document.getElementById("downloadCsvBtn").addEventListener("click",function(){

    if(historyList.length===0){

        alert("저장할 UUID가 없습니다.");

        return;

    }

    let csv="번호,UUID\n";

    historyList.forEach(function(item,index){

        csv += (index+1)+',"'+item+'"\n';

    });

    const blob=new Blob(
        [csv],
        {type:"text/csv;charset=utf-8"}
    );

    const url=URL.createObjectURL(blob);

    const a=document.createElement("a");

    a.href=url;

    a.download="uuid.csv";

    a.click();

    URL.revokeObjectURL(url);

});

/* ===========================
   기록 삭제
=========================== */

document.getElementById("clearBtn").addEventListener("click",function(){

    historyList=[];

    historyIndex=1;

    localStorage.removeItem("uuidHistory");

    historyTable.innerHTML=`
    <tr>
        <td colspan="3" class="text-center text-muted">
            생성된 UUID가 없습니다.
        </td>
    </tr>
    `;

    output.textContent="생성 버튼을 눌러주세요.";

    updateProgress(0,"대기중");

});

/* ===========================
   저장된 기록 불러오기
=========================== */

const saved = JSON.parse(
    localStorage.getItem("uuidHistory") || "[]"
);

if(saved.length>0){

    historyTable.innerHTML="";

    saved.forEach(function(item){

        historyList.push(item);

        addHistory(item);

    });

    output.textContent = historyList.join("\n");

    updateProgress(100,"이전 기록 불러옴");

}

/* ===========================
   단축키
=========================== */

document.addEventListener("keydown",function(e){

    if(e.ctrlKey && e.key==="Enter"){

        document.getElementById("generateBtn").click();

    }

});

/* ===========================
   변수
=========================== */

const output = document.getElementById("uuidOutput");
const historyTable = document.getElementById("historyTable");
const progressBar = document.getElementById("progressBar");
const statusText = document.getElementById("statusText");

let historyList = [];
let historyIndex = 1;

/* ===========================
   진행 상태
=========================== */

function updateProgress(value, text){

    progressBar.style.width = value + "%";

    progressBar.textContent = value + "%";

    statusText.textContent = text;

}

/* ===========================
   기록 추가
=========================== */

function addHistory(uuid){

    if(historyIndex === 1){

        historyTable.innerHTML = "";

    }

    const row = document.createElement("tr");

    row.innerHTML = `
        <td>${historyIndex}</td>
        <td><code>${uuid}</code></td>
        <td>${new Date().toLocaleTimeString()}</td>
    `;

    historyTable.appendChild(row);

    historyIndex++;

}
</script>
