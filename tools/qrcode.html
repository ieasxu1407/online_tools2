<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>QR 코드 생성기 | Online Tools</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">

<style>

body{

padding-top:70px;

background:#f5f6fa;

}

.tool-card{

max-width:1000px;

margin:auto;

border-radius:20px;

}

#qrcode{

width:300px;

height:300px;

margin:auto;

display:flex;

justify-content:center;

align-items:center;

background:#fff;

border:2px dashed #ced4da;

border-radius:15px;

overflow:hidden;

}

#qrcode img,
#qrcode canvas{

max-width:100%;

height:auto;

}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">

<div class="container">

<a class="navbar-brand" href="../index.html">

<i class="bi bi-tools"></i>

Online Tools

</a>

<button
class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#navbarMenu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="navbarMenu">

<ul class="navbar-nav me-auto">

<li class="nav-item">

<a class="nav-link" href="../index.html">

홈

</a>

</li>

<li class="nav-item">

<a class="nav-link active">

QR 코드 생성기

</a>

</li>

</ul>

<button
id="darkModeBtn"
class="btn btn-outline-light">

<i class="bi bi-moon"></i>

</button>

</div>

</div>

</nav>

<div class="container">

<div class="card shadow tool-card">

<div class="card-body p-4">

<h2 class="text-center mb-4">

<i class="bi bi-qr-code"></i>

QR 코드 생성기

</h2>

<div class="row">

<div class="col-lg-5">

<label class="form-label">

텍스트 / URL

</label>

<textarea

id="qrInput"

class="form-control"

rows="7"

placeholder="텍스트 또는 URL을 입력하세요."

></textarea>

<div class="mt-3">

<label class="form-label">

QR 크기

</label>

<select

id="qrSize"

class="form-select">

<option value="200">

200 × 200

</option>

<option value="250" selected>

250 × 250

</option>

<option value="300">

300 × 300

</option>

<option value="400">

400 × 400

</option>

</select>

</div>

<div class="mt-3">

<label class="form-label">

오류 수정 레벨

</label>

<select

id="qrLevel"

class="form-select">

<option value="L">

L (낮음)

</option>

<option value="M" selected>

M (보통)

</option>

<option value="Q">

Q (높음)

</option>

<option value="H">

H (최고)

</option>

</select>

</div>

<div class="form-check mt-3">

<input

class="form-check-input"

type="checkbox"

id="saveHistory"

checked>

<label class="form-check-label">

생성 기록 저장(LocalStorage)

</label>

</div>

</div>

<div class="col-lg-7">

<div id="qrcode">

<span class="text-muted">

QR 코드가 여기에 표시됩니다.

</span>

</div>

<hr>

<div class="progress">

<div

id="progressBar"

class="progress-bar progress-bar-striped progress-bar-animated"

style="width:0%">

0%

</div>

</div>

<p

id="statusText"

class="text-center mt-3 text-muted">

대기중

</p>
</div>

<hr class="my-4">

<div class="row g-3">

<div class="col-md-6">

<button
id="generateBtn"
class="btn btn-success w-100">

<i class="bi bi-qr-code"></i>

QR 코드 생성

</button>

</div>

<div class="col-md-6">

<button
id="downloadBtn"
class="btn btn-primary w-100">

<i class="bi bi-download"></i>

PNG 다운로드

</button>

</div>

<div class="col-md-4">

<button
id="copyBtn"
class="btn btn-secondary w-100">

<i class="bi bi-clipboard"></i>

내용 복사

</button>

</div>

<div class="col-md-4">

<button
id="clearBtn"
class="btn btn-warning w-100">

<i class="bi bi-arrow-clockwise"></i>

초기화

</button>

</div>

<div class="col-md-4">

<button
id="deleteBtn"
class="btn btn-danger w-100">

<i class="bi bi-trash"></i>

기록 삭제

</button>

</div>

</div>

<hr class="my-5">

<h4>

<i class="bi bi-clock-history"></i>

생성 기록

</h4>

<div class="table-responsive">

<table class="table table-striped table-hover align-middle">

<thead class="table-dark">

<tr>

<th width="80">

번호

</th>

<th>

내용

</th>

<th width="170">

생성시간

</th>

</tr>

</thead>

<tbody id="historyTable">

<tr>

<td colspan="3" class="text-center text-muted">

생성 기록이 없습니다.

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

<footer class="mt-5">

<div class="container">

<hr>

<div class="text-center text-muted">

© 2026 Online Tools

</div>

</div>

</footer>

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<!-- QRCode.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script src="../js/app.js"></script>

<script>

/* ===========================
   변수
=========================== */

const qrInput = document.getElementById("qrInput");

const qrContainer = document.getElementById("qrcode");

const historyTable = document.getElementById("historyTable");

const progressBar = document.getElementById("progressBar");

const statusText = document.getElementById("statusText");

let qrObject = null;

let historyIndex = 1;

let historyList = [];

/* ===========================
   진행률 표시
=========================== */

function setProgress(percent,text){

progressBar.style.width=percent+"%";

progressBar.textContent=percent+"%";

statusText.textContent=text;

}

/* ===========================
   기록 추가
=========================== */

function addHistory(text){

if(historyIndex===1){

historyTable.innerHTML="";

}

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${historyIndex}</td>

<td>${text}</td>

<td>${new Date().toLocaleTimeString()}</td>

`;

historyTable.appendChild(tr);

historyIndex++;

}
/* ===========================
   QR 코드 생성
=========================== */

function generateQRCode(){

    const text = qrInput.value.trim();

    if(text===""){

        alert("텍스트 또는 URL을 입력하세요.");

        return;

    }

    qrContainer.innerHTML="";

    qrObject = new QRCode(qrContainer,{

        text:text,

        width:parseInt(document.getElementById("qrSize").value),

        height:parseInt(document.getElementById("qrSize").value),

        correctLevel:QRCode.CorrectLevel[
            document.getElementById("qrLevel").value
        ]

    });

    setProgress(100,"QR 코드 생성 완료");

    if(document.getElementById("saveHistory").checked){

        historyList.push(text);

        localStorage.setItem(
            "qrHistory",
            JSON.stringify(historyList)
        );

        addHistory(text);

    }

}

document
.getElementById("generateBtn")
.addEventListener("click",generateQRCode);

/* ===========================
   PNG 다운로드
=========================== */

document
.getElementById("downloadBtn")
.addEventListener("click",function(){

    const canvas=qrContainer.querySelector("canvas");
    const img=qrContainer.querySelector("img");

    let imageUrl="";

    if(canvas){

        imageUrl=canvas.toDataURL("image/png");

    }else if(img){

        imageUrl=img.src;

    }else{

        alert("먼저 QR 코드를 생성하세요.");

        return;

    }

    const a=document.createElement("a");

    a.href=imageUrl;

    a.download="qrcode.png";

    a.click();

});

/* ===========================
   입력 내용 복사
=========================== */

document
.getElementById("copyBtn")
.addEventListener("click",async function(){

    const text=qrInput.value.trim();

    if(text===""){

        alert("복사할 내용이 없습니다.");

        return;

    }

    try{

        await navigator.clipboard.writeText(text);

        alert("복사되었습니다.");

    }catch{

        alert("복사에 실패했습니다.");

    }

});

/* ===========================
   초기화
=========================== */

document
.getElementById("clearBtn")
.addEventListener("click",function(){

    qrInput.value="";

    qrContainer.innerHTML=`
    <span class="text-muted">
        QR 코드가 여기에 표시됩니다.
    </span>`;

    setProgress(0,"대기중");

});

/* ===========================
   기록 삭제
=========================== */

document
.getElementById("deleteBtn")
.addEventListener("click",function(){

    historyIndex=1;

    historyList=[];

    localStorage.removeItem("qrHistory");

    historyTable.innerHTML=`
    <tr>
        <td colspan="3" class="text-center text-muted">
            생성 기록이 없습니다.
        </td>
    </tr>`;

});

/* ===========================
   저장된 기록 불러오기
=========================== */

const savedHistory=JSON.parse(
    localStorage.getItem("qrHistory")||"[]"
);

if(savedHistory.length>0){

    historyTable.innerHTML="";

    savedHistory.forEach(function(item){

        historyList.push(item);

        addHistory(item);

    });

}

/* ===========================
   Ctrl + Enter
=========================== */

qrInput.addEventListener("keydown",function(e){

    if(e.ctrlKey && e.key==="Enter"){

        generateQRCode();

    }

});

/* ===========================
   초기 상태
=========================== */

setProgress(0,"대기중");

</script>

</body>
</html>
