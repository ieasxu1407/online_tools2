HTML 편집기

<div class="col-md-2">

id="runBtn"
class="btn btn-success w-100">

</div>

<div class="col-md-2">

class="btn btn-warning w-100">

</button>

</div>

<div class="col-md-2">

<button
id="copyBtn"
class="btn btn-primary w-100">

복사

</button>

</div>

<div class="col-md-2">

<button
id="downloadBtn"
class="btn btn-info w-100">

</button>

</div>

<div class="col-md-2">

id="exampleBtn"
class="btn btn-secondary w-100">

<html>
<head>
<title>미리보기</title>
</head>
<body>

<h1>Hello World!</h1>

<p>HTML Editor</p>

</body>
</html></textarea>

</div>

<div
class="tab-pane fade"
id="cssTab">

<textarea
id="cssCode"
class="form-control"
spellcheck="false">body{

font-family:Arial;

padding:20px;

background:#ffffff;

}

h1{

color:#0d6efd;

}</textarea>

</div>

<div
class="tab-pane fade"
id="jsTab">

<textarea
id="jsCode"
class="form-control"
spellcheck="false">console.log("Hello Online Tools");</textarea>

</div>

</div>

</div>

<div class="col-lg-6">

<iframe
id="preview"
title="미리보기"></iframe>
</div>

</div>

<hr class="my-4">

<div class="row g-3">

<div class="col-md-3">

<div class="form-check form-switch">

<input
class="form-check-input"
type="checkbox"
id="autoRun"
checked>

<label
class="form-check-label"
for="autoRun">

자동 실행

</label>

</div>

type="file"
id="fileInput"
accept=".html,.htm"
class="form-control">

</div>

<div class="col-md-3">

<select
id="fontSize"
class="form-select">

<option value="14">14px</option>

<option value="15" selected>15px</option>

<option value="16">16px</option>

<option value="18">18px</option>

<option value="24">24px</option>

</select>

id="clearStorageBtn"
class="btn btn-danger w-100">

저장 데이터 삭제

</button>

</div>

</div>

</div>

</div>

<hr>

💬 댓글

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/app.js"></script>

<script>

/* ===========================
   요소
=========================== */

const htmlCode=document.getElementById("htmlCode");
const cssCode=document.getElementById("cssCode");
const jsCode=document.getElementById("jsCode");

const preview=document.getElementById("preview");

const autoRun=document.getElementById("autoRun");

const fileInput=document.getElementById("fileInput");

const fontSize=document.getElementById("fontSize");

/* ===========================
   기본 예제
=========================== */

const defaultHTML=`<!DOCTYPE html>
<html>
<head>
<title>HTML Editor</title>
</head>
<body>

<h1>Hello World!</h1>

<p>Online Tools HTML Editor</p>

</body>
</html>`;

const defaultCSS=`body{
font-family:Arial,sans-serif;
padding:20px;
background:#ffffff;
}

h1{
color:#0d6efd;
}`;

const defaultJS=`console.log("Hello Online Tools");`;
/* ===========================
   미리보기 실행
=========================== */

function runCode(){

    const html = htmlCode.value;
    const css = cssCode.value;
    const js = jsCode.value;

    const source = `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
${css}
</style>
</head>
<body>

${html}

<script>
${js}
<\/script>

</body>
</html>`;

    preview.srcdoc = source;

    localStorage.setItem("editor-html", html);
    localStorage.setItem("editor-css", css);
    localStorage.setItem("editor-js", js);

}

/* ===========================
   자동 실행
=========================== */

function autoRunEditor(){

    if(autoRun.checked){

        runCode();

    }

}

htmlCode.addEventListener("input", autoRunEditor);
cssCode.addEventListener("input", autoRunEditor);
jsCode.addEventListener("input", autoRunEditor);

/* ===========================
   실행 버튼
=========================== */

document
.getElementById("runBtn")
.addEventListener("click", runCode);

/* ===========================
   새 문서
=========================== */

document
.getElementById("newBtn")
.addEventListener("click", function(){

    if(!confirm("새 문서를 만드시겠습니까?")) return;

    htmlCode.value = defaultHTML;
    cssCode.value = defaultCSS;
    jsCode.value = defaultJS;

    runCode();

});

/* ===========================
   예제 불러오기
=========================== */

document
.getElementById("exampleBtn")
.addEventListener("click", function(){

htmlCode.value=`<div class="container">

<h1 class="text-primary">

Bootstrap Example

</h1>

<button class="btn btn-success">

클릭

</button>

</div>`;

cssCode.value=`body{

padding:30px;

font-family:Arial;

}`;

jsCode.value=`document.querySelector("button")
.onclick=function(){

alert("안녕하세요!");

};`;

runCode();

});

/* ===========================
   복사
=========================== */

document
.getElementById("copyBtn")
.addEventListener("click", async function(){

    try{

        await navigator.clipboard.writeText(

htmlCode.value +

"\n\n<style>\n"+

cssCode.value +

"\n</style>\n\n<script>\n"+

jsCode.value +

"\n<\/script>"

        );

        alert("복사되었습니다.");

    }catch{

        alert("복사 실패");

    }

});

/* ===========================
   HTML 다운로드
=========================== */

document
.getElementById("downloadBtn")
.addEventListener("click", function(){

    const html=`<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

${cssCode.value}

</style>
</head>
<body>

${htmlCode.value}

<script>

${jsCode.value}

<\/script>

</body>
</html>`;

    const blob=new Blob([html],{

        type:"text/html"

    });

    const url=URL.createObjectURL(blob);

    const a=document.createElement("a");

    a.href=url;

    a.download="index.html";

    a.click();

    URL.revokeObjectURL(url);

});

/* ===========================
   HTML 파일 열기
=========================== */

fileInput.addEventListener("change",function(){

    const file=this.files[0];

    if(!file) return;

    const reader=new FileReader();

    reader.onload=function(){

        htmlCode.value=reader.result;

        runCode();

    };

    reader.readAsText(file,"UTF-8");

});

/* ===========================
   글꼴 크기
=========================== */

fontSize.addEventListener("change",function(){

    htmlCode.style.fontSize=this.value+"px";
    cssCode.style.fontSize=this.value+"px";
    jsCode.style.fontSize=this.value+"px";

});

/* ===========================
   저장 데이터 삭제
=========================== */

document
.getElementById("clearStorageBtn")
.addEventListener("click",function(){

    if(!confirm("저장된 데이터를 삭제하시겠습니까?")) return;

    localStorage.removeItem("editor-html");
    localStorage.removeItem("editor-css");
    localStorage.removeItem("editor-js");

    alert("삭제되었습니다.");

});

/* ===========================
   전체화면
=========================== */

document
.getElementById("fullscreenBtn")
.addEventListener("click",function(){

    if(preview.requestFullscreen){

        preview.requestFullscreen();

    }

});

/* ===========================
   저장된 코드 복원
=========================== */

htmlCode.value=
localStorage.getItem("editor-html")||defaultHTML;

cssCode.value=
localStorage.getItem("editor-css")||defaultCSS;

jsCode.value=
localStorage.getItem("editor-js")||defaultJS;

/* ===========================
   최초 실행
=========================== */

runCode();

</script>

</body>

</html>
