<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/app.js"></script>

<script>

/* ===========================
   요소
=========================== */

const ipInput=document.getElementById("ipInput");

const ipAddress=document.getElementById("ipAddress");
const country=document.getElementById("country");
const city=document.getElementById("city");
const region=document.getElementById("region");
const isp=document.getElementById("isp");
const timezone=document.getElementById("timezone");
const asn=document.getElementById("asn");
const locationText=document.getElementById("location");

const historyTable=document.getElementById("historyTable");

let currentData={};

let historyIndex=1;

/* ===========================
   기록 추가
=========================== */

function addHistory(data){

if(historyIndex===1){

historyTable.innerHTML="";

}

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${historyIndex}</td>

<td>${data.ip}</td>

<td>${data.country}</td>

<td>${data.city}</td>

<td>${new Date().toLocaleString()}</td>

`;

historyTable.appendChild(tr);

historyIndex++;

}
/* ===========================
   IP 조회
=========================== */

async function lookupIP(){

    const input = ipInput.value.trim();

    const url = input === ""
        ? "https://ipapi.co/json/"
        : "https://ipapi.co/" + encodeURIComponent(input) + "/json/";

    try{

        const res = await fetch(url);

        const data = await res.json();

        if(data.error){

            alert("IP 조회에 실패했습니다.");

            return;

        }

        currentData = data;

        ipAddress.textContent = data.ip || "-";
        country.textContent = data.country_name || "-";
        city.textContent = data.city || "-";
        region.textContent = data.region || "-";
        isp.textContent = data.org || "-";
        timezone.textContent = data.timezone || "-";
        asn.textContent = data.asn || "-";

        locationText.textContent =
            (data.latitude ?? "-") + ", " +
            (data.longitude ?? "-");

        if(data.latitude && data.longitude){

            mapBtn.href =
                "https://www.openstreetmap.org/?mlat=" +
                data.latitude +
                "&mlon=" +
                data.longitude +
                "#map=12/" +
                data.latitude +
                "/" +
                data.longitude;

        }else{

            mapBtn.href="#";

        }

        addHistory({

            ip:data.ip,
            country:data.country_name,
            city:data.city

        });

        localStorage.setItem(
            "ipLookupLast",
            JSON.stringify(data)
        );

    }catch(e){

        alert("네트워크 오류가 발생했습니다.");

    }

}

/* ===========================
   조회
=========================== */

document
.getElementById("searchBtn")
.addEventListener("click",lookupIP);

/* ===========================
   Enter 조회
=========================== */

ipInput.addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        lookupIP();

    }

});

/* ===========================
   복사
=========================== */

document
.getElementById("copyBtn")
.addEventListener("click",async function(){

    if(!currentData.ip){

        alert("조회된 IP가 없습니다.");

        return;

    }

    try{

        await navigator.clipboard.writeText(currentData.ip);

        alert("IP가 복사되었습니다.");

    }catch{

        alert("복사에 실패했습니다.");

    }

});

/* ===========================
   새로고침
=========================== */

document
.getElementById("refreshBtn")
.addEventListener("click",lookupIP);

/* ===========================
   JSON 다운로드
=========================== */

document
.getElementById("downloadBtn")
.addEventListener("click",function(){

    if(!currentData.ip){

        alert("조회된 정보가 없습니다.");

        return;

    }

    const blob=new Blob(

        [JSON.stringify(currentData,null,2)],

        {

            type:"application/json"

        }

    );

    const url=URL.createObjectURL(blob);

    const a=document.createElement("a");

    a.href=url;

    a.download="ip-info.json";

    a.click();

    URL.revokeObjectURL(url);

});

/* ===========================
   마지막 조회 복원
=========================== */

const lastData = JSON.parse(

localStorage.getItem("ipLookupLast") || "null"

);

if(lastData){

    currentData = lastData;

    ipAddress.textContent = lastData.ip || "-";
    country.textContent = lastData.country_name || "-";
    city.textContent = lastData.city || "-";
    region.textContent = lastData.region || "-";
    isp.textContent = lastData.org || "-";
    timezone.textContent = lastData.timezone || "-";
    asn.textContent = lastData.asn || "-";

    locationText.textContent =
        (lastData.latitude ?? "-") +
        ", " +
        (lastData.longitude ?? "-");

}

/* ===========================
   페이지 최초 실행
=========================== */

lookupIP();

</script>
