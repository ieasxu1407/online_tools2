<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../css/style.css">

<style>

.password-card{

    max-width:900px;

.password-output{

    word-break:break-all;

    border-radius:12px;
    padding:20px;

}

.option-card{

    border-radius:15px;

}

.strength-bar{

    height:22px;
    border-radius:15px;

}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">

<div class="container">

<a class="navbar-brand" href="../index.html">

<i class="bi bi-tools"></i>

Online Tools

</a>

<button
class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#menu">

<span class="navbar-toggler-icon"></span>

</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav me-auto">

<li class="nav-item">

<a class="nav-link" href="../index.html">

홈

</a>

</li>

<li class="nav-item">

<a class="nav-link active">

비밀번호 생성기

</a>

</li>

</ul>

<button
id="darkModeBtn"
class="btn btn-outline-light">

<i class="bi bi-moon"></i>

</button>

</div>

</div>

</nav>

<div class="container mt-5">

<div class="card shadow password-card">

<div class="card-body p-5">

<h2 class="text-center mb-4">

<i class="bi bi-shield-lock-fill"></i>

비밀번호 생성기

</h2>

<div class="row">

<div class="col-lg-5">

<div class="card option-card shadow-sm">

<div class="card-body">

<h5>

옵션

</h5>

<hr>

<label class="form-label">

비밀번호 길이

</label>

<input
id="lengthRange"
type="range"
class="form-range"
min="4"
max="128"
value="16">

<div class="text-center mb-4">

<span
id="lengthValue"
class="badge bg-primary fs-6">

16

</span>

</div>

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
id="upperCase"
checked>

<label class="form-check-label">

대문자 포함 (A-Z)

</label>

</div>

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
id="lowerCase"
checked>

<label class="form-check-label">

소문자 포함 (a-z)

</label>

</div>

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
id="numbers"
checked>

<label class="form-check-label">

숫자 포함 (0-9)

</label>

</div>

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
id="symbols"
checked>

<label class="form-check-label">

특수문자 포함

</label>

</div>

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
id="excludeSimilar">

<label class="form-check-label">

헷갈리는 문자 제외

(O,0,I,l)

</label>

</div>

<div class="form-check">

<input
class="form-check-input"
type="checkbox"
id="excludeDuplicate">

<label class="form-check-label">

중복 문자 허용 안 함

</label>

</div>

</div>

</div>

</div>

<div class="col-lg-7">

<h5>

생성된 비밀번호

</h5>

<div
id="passwordOutput"
class="password-output">

생성 버튼을 눌러주세요.

</div>

<div class="mt-4">

<label>

비밀번호 강도

</label>

<div class="progress strength-bar">

<div
id="strengthBar"
class="progress-bar bg-danger"
style="width:0%">

0%

</div>

</div>

<h5
id="strengthText"
class="mt-3 text-danger">

약함

</h5>
</div>

<hr class="my-4">

<div class="row g-3">

    <div class="col-md-6">

        <label class="form-label">

            생성 개수

        </label>

        <select id="passwordCount" class="form-select">

            <option value="1">1개</option>
            <option value="3">3개</option>
            <option value="5">5개</option>
            <option value="10">10개</option>
            <option value="20">20개</option>

        </select>

    </div>

    <div class="col-md-6">

        <label class="form-label">

            비밀번호 길이

        </label>

        <input
            id="lengthNumber"
            type="number"
            class="form-control"
            min="4"
            max="128"
            value="16">

    </div>

</div>

<div class="row mt-4 g-3">

    <div class="col-md-6">

        <button
            id="generateBtn"
            class="btn btn-success w-100">

            <i class="bi bi-arrow-repeat"></i>

            비밀번호 생성

        </button>

    </div>

    <div class="col-md-6">

        <button
            id="copyBtn"
            class="btn btn-primary w-100">

            <i class="bi bi-clipboard"></i>

            복사

        </button>

    </div>

</div>

<div class="row mt-3 g-3">

    <div class="col-md-6">

        <button
            id="downloadBtn"
            class="btn btn-secondary w-100">

            <i class="bi bi-download"></i>

            TXT 저장

        </button>

    </div>

    <div class="col-md-6">

        <button
            id="clearHistoryBtn"
            class="btn btn-danger w-100">

            <i class="bi bi-trash"></i>

            기록 삭제

        </button>

    </div>

</div>

<hr class="my-5">

<h4>

<i class="bi bi-clock-history"></i>

생성 기록

</h4>

<div class="table-responsive">

<table class="table table-striped table-hover align-middle">

<thead class="table-dark">

<tr>

<th width="70">

번호

</th>

<th>

비밀번호

</th>

<th width="120">

길이

</th>

<th width="150">

생성시간

</th>

</tr>

</thead>

<tbody id="historyTable">

<tr>

<td colspan="4" class="text-center text-muted">

생성된 비밀번호가 없습니다.

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

<footer class="mt-5">

<div class="container">

<hr>

<div class="text-center">

© 2026 Online Tools

</div>

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/app.js"></script>

<script>

/* ===========================
   문자 집합
=========================== */

const CHAR_UPPER = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const CHAR_LOWER = "abcdefghijklmnopqrstuvwxyz";
const CHAR_NUMBER = "0123456789";
const CHAR_SYMBOL = "!@#$%^&*()_+-=[]{}|;:,.<>?";

/* ===========================
   비밀번호 생성
=========================== */

document.getElementById("generateBtn").addEventListener("click", generatePasswords);

function generatePasswords(){

    const length = parseInt(lengthNumber.value);

    const count = parseInt(document.getElementById("passwordCount").value);

    let chars = "";

    if(document.getElementById("upperCase").checked)
        chars += CHAR_UPPER;

    if(document.getElementById("lowerCase").checked)
        chars += CHAR_LOWER;

    if(document.getElementById("numbers").checked)
        chars += CHAR_NUMBER;

    if(document.getElementById("symbols").checked)
        chars += CHAR_SYMBOL;

    if(chars===""){

        alert("최소 한 개 이상의 옵션을 선택하세요.");

        return;

    }

    if(document.getElementById("excludeSimilar").checked){

        chars = chars.replace(/[O0Il]/g,"");

    }

    historyTable.innerHTML="";

    historyList=[];

    historyIndex=1;

    let firstPassword="";

    for(let i=0;i<count;i++){

        let password="";

        let pool=chars;

        while(password.length<length){

            if(pool.length===0){

                pool=chars;

            }

            const random=Math.floor(Math.random()*pool.length);

            password+=pool[random];

            if(document.getElementById("excludeDuplicate").checked){

                pool=
                    pool.substring(0,random)+
                    pool.substring(random+1);

            }

        }

        if(i===0){

            firstPassword=password;

            output.textContent=password;

            updateStrength(password);

        }

        historyList.push(password);

        addHistory(password);

    }

    localStorage.setItem(
        "passwordHistory",
        JSON.stringify(historyList)
    );

}

/* ===========================
   강도 표시
=========================== */

function updateStrength(password){

    let score=0;

    if(password.length>=8) score++;
    if(password.length>=12) score++;
    if(/[A-Z]/.test(password)) score++;
    if(/[a-z]/.test(password)) score++;
    if(/[0-9]/.test(password)) score++;
    if(/[^A-Za-z0-9]/.test(password)) score++;

    const percent=Math.min(score*16,100);

    strengthBar.style.width=percent+"%";
    strengthBar.textContent=percent+"%";

    if(score<=2){

        strengthBar.className="progress-bar bg-danger";
        strengthText.className="mt-3 text-danger";
        strengthText.textContent="약함";

    }else if(score<=4){

        strengthBar.className="progress-bar bg-warning";
        strengthText.className="mt-3 text-warning";
        strengthText.textContent="보통";

    }else if(score===5){

        strengthBar.className="progress-bar bg-info";
        strengthText.className="mt-3 text-info";
        strengthText.textContent="강함";

    }else{

        strengthBar.className="progress-bar bg-success";
        strengthText.className="mt-3 text-success";
        strengthText.textContent="매우 강함";

    }

}

/* ===========================
   기록 추가
=========================== */

function addHistory(password){

    const row=document.createElement("tr");

    row.innerHTML=`
    <td>${historyIndex}</td>
    <td><code>${password}</code></td>
    <td>${password.length}</td>
    <td>${new Date().toLocaleTimeString()}</td>
    `;

    historyTable.appendChild(row);

    historyIndex++;

}

/* ===========================
   복사
=========================== */

document.getElementById("copyBtn").addEventListener("click",function(){

    if(output.textContent==="생성 버튼을 눌러주세요."){

        alert("비밀번호를 먼저 생성하세요.");

        return;

    }

    navigator.clipboard.writeText(output.textContent);

    alert("복사되었습니다.");

});

/* ===========================
   TXT 저장
=========================== */

document.getElementById("downloadBtn").addEventListener("click",function(){

    if(historyList.length===0){

        alert("저장할 내용이 없습니다.");

        return;

    }

    const blob=new Blob(

        [historyList.join("\n")],

        {type:"text/plain;charset=utf-8"}

    );

    const url=URL.createObjectURL(blob);

    const a=document.createElement("a");

    a.href=url;

    a.download="passwords.txt";

    a.click();

    URL.revokeObjectURL(url);

});

/* ===========================
   기록 삭제
=========================== */

document.getElementById("clearHistoryBtn").addEventListener("click",function(){

    historyList=[];

    historyIndex=1;

    localStorage.removeItem("passwordHistory");

    historyTable.innerHTML=`
    <tr>
    <td colspan="4" class="text-center text-muted">
    생성된 비밀번호가 없습니다.
    </td>
    </tr>
    `;

});

/* ===========================
   저장된 기록 불러오기
=========================== */

const saved=JSON.parse(
    localStorage.getItem("passwordHistory")||"[]"
);

if(saved.length>0){

    historyTable.innerHTML="";

    saved.forEach(function(item){

        historyList.push(item);

        addHistory(item);

    });

}

/* ===========================
   단축키
=========================== */

document.addEventListener("keydown",function(e){

    if(e.ctrlKey && e.key==="Enter"){

        generatePasswords();

    }

});

/* ===========================
   변수
=========================== */

const output = document.getElementById("passwordOutput");

const strengthBar = document.getElementById("strengthBar");

const strengthText = document.getElementById("strengthText");

const historyTable = document.getElementById("historyTable");

const lengthRange = document.getElementById("lengthRange");

const lengthNumber = document.getElementById("lengthNumber");

const lengthValue = document.getElementById("lengthValue");

/* 길이 동기화 */

lengthRange.addEventListener("input", function(){

    lengthNumber.value=this.value;

    lengthValue.textContent=this.value;

});

lengthNumber.addEventListener("input", function(){

    lengthRange.value=this.value;

    lengthValue.textContent=this.value;

});

let historyIndex=1;

let historyList=[];
</script>

</body>
</html>
