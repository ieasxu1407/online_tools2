<script>

const display=document.getElementById("display");

const history=document.getElementById("history");

const historyList=document.getElementById("historyList");

const buttons=document.querySelectorAll(".calc-btn");

let expression="";

let records=[];

function updateDisplay(){

display.value=expression||"0";

}

function addHistory(exp,result){

if(records.length===0){

historyList.innerHTML="";

}

const div=document.createElement("div");

div.className="border-bottom py-1";

div.innerHTML=`${exp} = <strong>${result}</strong>`;

historyList.prepend(div);

records.unshift({exp,result});

localStorage.setItem("calculatorHistory",JSON.stringify(records));

}
/* ===========================
   계산 처리
=========================== */

buttons.forEach(function(btn){

    btn.addEventListener("click",function(){

        const value=this.dataset.value;

        switch(value){

            case "C":

                expression="";

                history.textContent="";

                updateDisplay();

                break;

            case "CE":

                expression="";

                updateDisplay();

                break;

            case "BACK":

                expression=expression.slice(0,-1);

                updateDisplay();

                break;

            case "=":

                calculate();

                break;

            case "SQRT":

                if(expression==="") return;

                try{

                    expression=Math.sqrt(eval(expression)).toString();

                    updateDisplay();

                }catch{

                    display.value="오류";

                    expression="";

                }

                break;

            case "SQUARE":

                if(expression==="") return;

                try{

                    expression=Math.pow(eval(expression),2).toString();

                    updateDisplay();

                }catch{

                    display.value="오류";

                    expression="";

                }

                break;

            case "INV":

                if(expression==="") return;

                try{

                    expression=(1/eval(expression)).toString();

                    updateDisplay();

                }catch{

                    display.value="오류";

                    expression="";

                }

                break;

            case "NEG":

                if(expression==="") return;

                try{

                    expression=(-eval(expression)).toString();

                    updateDisplay();

                }catch{

                    display.value="오류";

                    expression="";

                }

                break;

            case "%":

                if(expression==="") return;

                try{

                    expression=(eval(expression)/100).toString();

                    updateDisplay();

                }catch{

                    display.value="오류";

                    expression="";

                }

                break;

            default:

                expression+=value;

                updateDisplay();

        }

    });

});

/* ===========================
   계산
=========================== */

function calculate(){

    if(expression==="") return;

    try{

        const exp=expression.replace(/×/g,"*").replace(/÷/g,"/");

        const result=Function('"use strict";return ('+exp+')')();

        history.textContent=expression+" =";

        addHistory(expression,result);

        expression=result.toString();

        updateDisplay();

    }catch{

        display.value="오류";

        expression="";

    }

}

/* ===========================
   키보드 입력
=========================== */

document.addEventListener("keydown",function(e){

    if(/[0-9+\-*/.%]/.test(e.key)){

        expression+=e.key;

        updateDisplay();

    }

    else if(e.key==="Enter"){

        e.preventDefault();

        calculate();

    }

    else if(e.key==="Backspace"){

        expression=expression.slice(0,-1);

        updateDisplay();

    }

    else if(e.key==="Delete"){

        expression="";

        updateDisplay();

    }

});

/* ===========================
   기록 복원
=========================== */

const saved=JSON.parse(

localStorage.getItem("calculatorHistory")||"[]"

);

if(saved.length){

    historyList.innerHTML="";

    records=saved;

    saved.forEach(function(item){

        const div=document.createElement("div");

        div.className="border-bottom py-1";

        div.innerHTML=`${item.exp} = <strong>${item.result}</strong>`;

        historyList.appendChild(div);

    });

}

/* ===========================
   초기화
=========================== */

updateDisplay();

</script>
