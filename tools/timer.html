<div class="container mt-5">

<div class="card shadow timer-card">

<div class="card-body p-5">

<h2 class="text-center mb-4">

<i class="bi bi-alarm"></i>

타이머

</h2>

<div class="row">

<div class="col-md-4">

<label>시간</label>

<input
id="hour"
type="number"
class="form-control"
value="0"
min="0">

</div>

<div class="col-md-4">

<label>분</label>

<input
id="minute"
type="number"
class="form-control"
value="5"
min="0"
max="59">

</div>

<div class="col-md-4">

<label>초</label>

<input
id="second"
type="number"
class="form-control"
value="0"
min="0"
max="59">

</div>

</div>

<div class="text-center mt-5">

<div id="timeDisplay">

00:05:00

</div>

</div>

<div class="progress mt-4">

<div
id="progressBar"
class="progress-bar progress-bar-striped progress-bar-animated"
style="width:0%">

</div>

</div>

<div class="text-center mt-5">

<button
id="startBtn"
class="btn btn-success btn-lg">

<i class="bi bi-play-fill"></i>

시작

</button>

<button
id="pauseBtn"
class="btn btn-warning btn-lg">

<i class="bi bi-pause-fill"></i>

일시정지

</button>

<button
id="resetBtn"
class="btn btn-danger btn-lg">

<i class="bi bi-arrow-clockwise"></i>

초기화

</button>

</div>

<h4 class="mt-5">

빠른 설정

</h4>

<div class="preset">

<button class="btn btn-outline-primary" onclick="preset(1)">1분</button>

<button class="btn btn-outline-primary" onclick="preset(5)">5분</button>

<button class="btn btn-outline-primary" onclick="preset(10)">10분</button>

<button class="btn btn-outline-primary" onclick="preset(30)">30분</button>

<button class="btn btn-outline-primary" onclick="preset(60)">1시간</button>

</div>
<!-- 종료 알림 -->

<div class="alert alert-success mt-4 d-none" id="finishAlert">

    <h5 class="mb-2">

        <i class="bi bi-check-circle-fill"></i>

        타이머가 종료되었습니다!

    </h5>

    <p class="mb-0">

        설정한 시간이 모두 지났습니다.

    </p>

</div>

<hr class="my-5">

<div class="row text-center">

    <div class="col-md-4">

        <div class="card shadow-sm">

            <div class="card-body">

                <i class="bi bi-hourglass-split display-5 text-primary"></i>

                <h5 class="mt-3">

                    남은 시간

                </h5>

                <h3 id="remainTime">

                    00:05:00

                </h3>

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card shadow-sm">

            <div class="card-body">

                <i class="bi bi-speedometer2 display-5 text-success"></i>

                <h5 class="mt-3">

                    진행률

                </h5>

                <h3>

                    <span id="percent">

                        0

                    </span>%

            </div>

        </div>

    </div>

    <div class="col-md-4">

        <div class="card shadow-sm">

            <div class="card-body">

                <i class="bi bi-flag-fill display-5 text-danger"></i>

                    상태

    </div>

id="fullscreenBtn"
class="btn btn-dark">

<i class="bi bi-arrows-fullscreen"></i>

id="muteBtn"
class="btn btn-secondary">

<i class="bi bi-volume-up-fill"></i>

알림음

</button>

<source src="../audio/alarm.mp3" type="audio/mpeg">

</audio>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/app.js"></script>

<script>

let totalSeconds = 0;
let remainSeconds = 0;
let timer = null;
let paused = false;

const display = document.getElementById("timeDisplay");
const remainLabel = document.getElementById("remainTime");
const percent = document.getElementById("percent");
const progress = document.getElementById("progressBar");
const statusText = document.getElementById("statusText");

function preset(min){

    document.getElementById("hour").value=0;
    document.getElementById("minute").value=min;
    document.getElementById("second").value=0;

    updatePreview();

}

function updatePreview(){

    const h=parseInt(hour.value)||0;
    const m=parseInt(minute.value)||0;
    const s=parseInt(second.value)||0;

    const hh=String(h).padStart(2,"0");
    const mm=String(m).padStart(2,"0");
    const ss=String(s).padStart(2,"0");

    display.innerHTML=`${hh}:${mm}:${ss}`;
    remainLabel.innerHTML=`${hh}:${mm}:${ss}`;

}

hour.oninput=updatePreview;
minute.oninput=updatePreview;
second.oninput=updatePreview;

updatePreview();

/* ===========================
   버튼 가져오기
=========================== */

const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const resetBtn = document.getElementById("resetBtn");
const finishAlert = document.getElementById("finishAlert");
const alarmAudio = document.getElementById("alarmAudio");

let soundEnabled = true;

/* ===========================
   시작
=========================== */

startBtn.addEventListener("click", function () {

    if (timer !== null) return;

    if (!paused) {

        const h = Number(hour.value);
        const m = Number(minute.value);
        const s = Number(second.value);

        totalSeconds = h * 3600 + m * 60 + s;
        remainSeconds = totalSeconds;

        if (totalSeconds <= 0) {

            alert("시간을 설정해주세요.");
            return;

        }

    }

    paused = false;
    statusText.textContent = "실행중";

    timer = setInterval(runTimer, 1000);

});

/* ===========================
   실행
=========================== */

function runTimer() {

    if (remainSeconds <= 0) {

        finishTimer();
        return;

    }

    remainSeconds--;

    updateTimer();

}

/* ===========================
   화면 갱신
=========================== */

function updateTimer() {

    const h = Math.floor(remainSeconds / 3600);
    const m = Math.floor((remainSeconds % 3600) / 60);
    const s = remainSeconds % 60;

    const text =
        String(h).padStart(2, "0") + ":" +
        String(m).padStart(2, "0") + ":" +
        String(s).padStart(2, "0");

    display.textContent = text;
    remainLabel.textContent = text;

    let p = ((totalSeconds - remainSeconds) / totalSeconds) * 100;

    p = Math.max(0, Math.min(100, p));

    progress.style.width = p + "%";
    percent.textContent = p.toFixed(0);

}

/* ===========================
   일시정지
=========================== */

pauseBtn.addEventListener("click", function () {

    if (timer == null) return;

    clearInterval(timer);

    timer = null;

    paused = true;

    statusText.textContent = "일시정지";

});

/* ===========================
   초기화
=========================== */

resetBtn.addEventListener("click", function () {

    clearInterval(timer);

    timer = null;

    paused = false;

    totalSeconds = 0;
    remainSeconds = 0;

    progress.style.width = "0%";
    percent.textContent = "0";

    finishAlert.classList.add("d-none");

    statusText.textContent = "대기중";

    updatePreview();

});

/* ===========================
   종료
=========================== */

function finishTimer() {

    clearInterval(timer);

    timer = null;

    paused = false;

    display.textContent = "00:00:00";
    remainLabel.textContent = "00:00:00";

    progress.style.width = "100%";
    percent.textContent = "100";

    statusText.textContent = "종료";

    finishAlert.classList.remove("d-none");

    if (soundEnabled && alarmAudio) {

        alarmAudio.currentTime = 0;
        alarmAudio.play().catch(() => {});

    }

    if ("Notification" in window &&
        Notification.permission === "granted") {

        new Notification("타이머 종료", {
            body: "설정한 시간이 모두 지났습니다."
        });

    }

}

/* ===========================
   전체화면
=========================== */

document.getElementById("fullscreenBtn")
.addEventListener("click", function () {

    if (!document.fullscreenElement) {

        document.documentElement.requestFullscreen();

    } else {

        document.exitFullscreen();

    }

});

/* ===========================
   알림음 ON/OFF
=========================== */

document.getElementById("muteBtn")
.addEventListener("click", function () {

    soundEnabled = !soundEnabled;

    this.innerHTML = soundEnabled
        ? '<i class="bi bi-volume-up-fill"></i> 알림음'
        : '<i class="bi bi-volume-mute-fill"></i> 음소거';

});

/* ===========================
   알림 권한
=========================== */

if ("Notification" in window &&
    Notification.permission !== "granted") {

    Notification.requestPermission();

}

/* ===========================
   단축키
=========================== */

document.addEventListener("keydown", function (e) {

    if (e.code === "Space") {

        e.preventDefault();

        if (timer === null)
            startBtn.click();
        else
            pauseBtn.click();

    }

    if (e.key === "Escape") {

        resetBtn.click();

    }

});
</script>
