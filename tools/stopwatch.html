<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/app.js"></script>

<script>

/* ===========================
   변수
=========================== */

let timer = null;

let running = false;

let startTime = 0;

let elapsed = 0;

let lap = 0;

let lapTimes = [];

const display = document.getElementById("timeDisplay");

const lapTable = document.getElementById("lapTable");

const lapCount = document.getElementById("lapCount");

const bestLap = document.getElementById("bestLap");

const avgLap = document.getElementById("avgLap");

/* ===========================
   시간 표시
=========================== */

function formatTime(ms){

    const hour=Math.floor(ms/3600000);

    const minute=Math.floor((ms%3600000)/60000);

    const second=Math.floor((ms%60000)/1000);

    const milli=ms%1000;

    return String(hour).padStart(2,"0")+":"+

           String(minute).padStart(2,"0")+":"+

           String(second).padStart(2,"0")+"."+

           String(milli).padStart(3,"0");

}

/* ===========================
   화면 갱신
=========================== */

function updateDisplay(){

    display.textContent=formatTime(elapsed);

}

/* ===========================
   최고 / 평균 랩 계산
=========================== */

function updateLapInfo(){

    lapCount.textContent=lap;

    if(lapTimes.length===0){

        bestLap.textContent="-";

        avgLap.textContent="-";

        return;

    }

    const best=Math.min(...lapTimes);

    const avg=lapTimes.reduce((a,b)=>a+b,0)/lapTimes.length;

    bestLap.textContent=formatTime(best);

    avgLap.textContent=formatTime(avg);

}

/* ===========================
   시작 / 이어하기
=========================== */

const startBtn = document.getElementById("startBtn");
const pauseBtn = document.getElementById("pauseBtn");
const resetBtn = document.getElementById("resetBtn");
const lapBtn = document.getElementById("lapBtn");

startBtn.addEventListener("click", function () {

    if (running) return;

    running = true;

    startTime = Date.now() - elapsed;

    timer = setInterval(function () {

        elapsed = Date.now() - startTime;

        updateDisplay();

    }, 10);

});

/* ===========================
   일시정지
=========================== */

pauseBtn.addEventListener("click", function () {

    if (!running) return;

    clearInterval(timer);

    running = false;

});

/* ===========================
   초기화
=========================== */

resetBtn.addEventListener("click", function () {

    clearInterval(timer);

    running = false;

    elapsed = 0;

    lap = 0;

    lapTimes = [];

    updateDisplay();

    updateLapInfo();

    lapTable.innerHTML = `
        <tr>
            <td colspan="2" class="text-center text-muted">
                랩 기록이 없습니다.
            </td>
        </tr>
    `;

});

/* ===========================
   랩 기록
=========================== */

lapBtn.addEventListener("click", function () {

    if (!running) return;

    lap++;

    lapTimes.push(elapsed);

    updateLapInfo();

    if (lap === 1)
        lapTable.innerHTML = "";

    const tr = document.createElement("tr");

    tr.innerHTML = `
        <td>Lap ${lap}</td>
        <td>${formatTime(elapsed)}</td>
    `;

    lapTable.prepend(tr);

});

/* ===========================
   랩 삭제
=========================== */

document.getElementById("clearLapBtn")
.addEventListener("click", function () {

    lap = 0;

    lapTimes = [];

    updateLapInfo();

    lapTable.innerHTML = `
        <tr>
            <td colspan="2" class="text-center text-muted">
                랩 기록이 없습니다.
            </td>
        </tr>
    `;

});

/* ===========================
   기록 복사
=========================== */

document.getElementById("copyBtn")
.addEventListener("click", function () {

    if (lapTimes.length === 0) {

        alert("복사할 기록이 없습니다.");

        return;

    }

    let text = "";

    lapTimes.forEach(function (time, index) {

        text += `Lap ${index + 1} : ${formatTime(time)}\n`;

    });

    navigator.clipboard.writeText(text);

    alert("랩 기록을 복사했습니다.");

});

/* ===========================
   CSV 저장
=========================== */

document.getElementById("downloadBtn")
.addEventListener("click", function () {

    if (lapTimes.length === 0) {

        alert("저장할 기록이 없습니다.");

        return;

    }

    let csv = "Lap,Time\n";

    lapTimes.forEach(function (time, index) {

        csv += `${index + 1},${formatTime(time)}\n`;

    });

    const blob = new Blob([csv], {

        type: "text/csv;charset=utf-8"

    });

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;

    a.download = "lap_times.csv";

    a.click();

    URL.revokeObjectURL(url);

});

/* ===========================
   전체화면
=========================== */

document.getElementById("fullscreenBtn")
.addEventListener("click", function () {

    if (!document.fullscreenElement) {

        document.documentElement.requestFullscreen();

    } else {

        document.exitFullscreen();

    }

});

/* ===========================
   키보드 단축키
=========================== */

document.addEventListener("keydown", function (e) {

    if (e.code === "Space") {

        e.preventDefault();

        if (running)
            pauseBtn.click();
        else
            startBtn.click();

    }

    if (e.key === "Escape") {

        resetBtn.click();

    }

    if (e.key.toLowerCase() === "l") {

        lapBtn.click();

    }

});

/* ===========================
   초기 표시
=========================== */

updateDisplay();

updateLapInfo();

</script>
