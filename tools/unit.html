</h2>

<div class="row g-3">

<div class="col-md-4">

<label class="form-label">

변환 종류

</label>

<select
id="category"
class="form-select">

<option value="length">길이</option>

<option value="weight">무게</option>

<option value="temperature">온도</option>

<option value="time">시간</option>

<option value="area">면적</option>

<option value="volume">부피</option>

<option value="speed">속도</option>

<option value="data">데이터</option>

</select>

</div>

<div class="col-md-4">

<label class="form-label">

입력 값

</label>

<input
type="number"
id="inputValue"
class="form-control"
value="1"
step="any">

</div>

<div class="col-md-4">

<label class="form-label">

즐겨찾기

</label>

<div class="form-control">

id="favoriteBtn"
class="favorite">

</span>

현재 단위 저장

</div>

</div>

</div>

<div class="col-md-5">

<label class="form-label">

변환 전

</label>

<select
id="fromUnit"
class="form-select">

</select>

</div>

<div class="col-md-2 d-grid">

<label class="form-label">

&nbsp;

</label>

id="swapBtn"
class="btn btn-primary">

</label>

class="form-select">

</select>

id="resultBox"
class="result-box">

결과가 여기에 표시됩니다.

</div>
<hr>

<div class="col-md-3">

<button
id="convertBtn"
class="btn btn-success w-100">

변환

</button>

</div>

<div class="col-md-3">

<button
id="copyBtn"
class="btn btn-primary w-100">

</button>

</div>

<div class="col-lg-6">

</h5>

id="historyList"
class="border rounded p-3"

</h5>

id="favoriteList"
class="border rounded p-3"
style="height:220px;overflow:auto;">

즐겨찾기가 없습니다.

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/app.js"></script>

<script>

/* ===========================
   요소
=========================== */

const category=document.getElementById("category");
const inputValue=document.getElementById("inputValue");

const fromUnit=document.getElementById("fromUnit");
const toUnit=document.getElementById("toUnit");

const resultBox=document.getElementById("resultBox");

const historyList=document.getElementById("historyList");
const favoriteList=document.getElementById("favoriteList");

/* ===========================
   단위 데이터
=========================== */

const units={

length:{
mm:0.001,
cm:0.01,
m:1,
km:1000,
inch:0.0254,
ft:0.3048,
yd:0.9144,
mile:1609.344
},

weight:{
mg:0.001,
g:1,
kg:1000,
ton:1000000,
oz:28.349523125,
lb:453.59237
},

time:{
ms:0.001,
sec:1,
min:60,
hour:3600,
day:86400,
week:604800
},

speed:{
"m/s":1,
"km/h":0.2777777778,
mph:0.44704,
knot:0.514444
},

data:{
Bit:0.125,
Byte:1,
KB:1024,
MB:1048576,
GB:1073741824,
TB:1099511627776
},

area:{
"㎡":1,
"㎢":1000000,
"평":3.305785,
acre:4046.8564224,
hectare:10000
},

volume:{
mL:0.001,
cc:0.001,
L:1,
gallon:3.785411784
}

};

/* ===========================
   저장 데이터
=========================== */

let historyData=JSON.parse(

localStorage.getItem("unitHistory")||"[]"

);

let favoriteData=JSON.parse(

localStorage.getItem("unitFavorite")||"[]"

);
/* ===========================
   단위 목록 채우기
=========================== */

function loadUnits(){

    fromUnit.innerHTML="";
    toUnit.innerHTML="";

    if(category.value==="temperature"){

        ["℃","℉","K"].forEach(unit=>{

            fromUnit.add(new Option(unit,unit));
            toUnit.add(new Option(unit,unit));

        });

    }else{

        Object.keys(units[category.value]).forEach(unit=>{

            fromUnit.add(new Option(unit,unit));
            toUnit.add(new Option(unit,unit));

        });

    }

    toUnit.selectedIndex=1;

}

/* ===========================
   변환
=========================== */

function convert(){

    const value=parseFloat(inputValue.value);

    if(isNaN(value)) return;

    let result=0;

    if(category.value==="temperature"){

        const from=fromUnit.value;
        const to=toUnit.value;

        let c;

        if(from==="℃") c=value;
        if(from==="℉") c=(value-32)/1.8;
        if(from==="K") c=value-273.15;

        if(to==="℃") result=c;
        if(to==="℉") result=c*1.8+32;
        if(to==="K") result=c+273.15;

    }else{

        const data=units[category.value];

        result=value*data[fromUnit.value]/data[toUnit.value];

    }

    resultBox.innerHTML=
        `${value} ${fromUnit.value}<br>⬇<br><b>${result.toFixed(6)}</b> ${toUnit.value}`;

    historyData.unshift(
        `${value} ${fromUnit.value} → ${result.toFixed(6)} ${toUnit.value}`
    );

    historyData=historyData.slice(0,20);

    localStorage.setItem(
        "unitHistory",
        JSON.stringify(historyData)
    );

    renderHistory();

}

/* ===========================
   기록
=========================== */

function renderHistory(){

    historyList.innerHTML="";

    if(historyData.length===0){

        historyList.innerHTML="<div class='text-muted'>기록이 없습니다.</div>";

        return;

    }

    historyData.forEach(item=>{

        historyList.innerHTML+=
        `<div class="history-item">${item}</div>`;

    });

}

/* ===========================
   즐겨찾기
=========================== */

function renderFavorite(){

    favoriteList.innerHTML="";

    if(favoriteData.length===0){

        favoriteList.innerHTML="<div class='text-muted'>즐겨찾기가 없습니다.</div>";

        return;

    }

    favoriteData.forEach(item=>{

        favoriteList.innerHTML+=
        `<div class="history-item">${item}</div>`;

    });

}

document.getElementById("favoriteBtn").onclick=function(){

    const text=
    `${category.value} : ${fromUnit.value} → ${toUnit.value}`;

    if(!favoriteData.includes(text)){

        favoriteData.push(text);

        localStorage.setItem(
            "unitFavorite",
            JSON.stringify(favoriteData)
        );

        renderFavorite();

    }

};

/* ===========================
   단위 교환
=========================== */

document.getElementById("swapBtn").onclick=function(){

    const temp=fromUnit.value;

    fromUnit.value=toUnit.value;

    toUnit.value=temp;

    convert();

};

/* ===========================
   결과 복사
=========================== */

document.getElementById("copyBtn").onclick=async function(){

    try{

        await navigator.clipboard.writeText(
            resultBox.innerText
        );

        alert("복사되었습니다.");

    }catch{

        alert("복사 실패");

    }

};

/* ===========================
   랜덤 예제
=========================== */

document.getElementById("exampleBtn").onclick=function(){

    inputValue.value=Math.floor(Math.random()*1000)+1;

    convert();

};

/* ===========================
   기록 삭제
=========================== */

document.getElementById("clearHistoryBtn").onclick=function(){

    if(!confirm("기록을 삭제하시겠습니까?")) return;

    historyData=[];

    localStorage.removeItem("unitHistory");

    renderHistory();

};

/* ===========================
   이벤트
=========================== */

category.onchange=function(){

    loadUnits();

    convert();

};

inputValue.oninput=convert;
fromUnit.onchange=convert;
toUnit.onchange=convert;

document.getElementById("convertBtn").onclick=convert;

/* ===========================
   최초 실행
=========================== */

loadUnits();

renderHistory();

renderFavorite();

convert();

</script>

</body>
