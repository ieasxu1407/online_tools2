<script src="../js/app.js"></script>

<script>

/* ===========================
   요소
=========================== */

const colorPicker=document.getElementById("colorPicker");
const alpha=document.getElementById("alpha");

const colorPreview=document.getElementById("colorPreview");

const hexCode=document.getElementById("hexCode");
const rgbCode=document.getElementById("rgbCode");
const hslCode=document.getElementById("hslCode");

const alphaValue=document.getElementById("alphaValue");

const historyColors=document.getElementById("historyColors");

let historyList=JSON.parse(

localStorage.getItem("colorHistory")||"[]"

);

/* ===========================
   HEX → RGB
=========================== */

function hexToRgb(hex){

hex=hex.replace("#","");

const r=parseInt(hex.substring(0,2),16);

const g=parseInt(hex.substring(2,4),16);

const b=parseInt(hex.substring(4,6),16);

return {r,g,b};

}

/* ===========================
   RGB → HSL
=========================== */

function rgbToHsl(r,g,b){

r/=255;
g/=255;
b/=255;

const max=Math.max(r,g,b);
const min=Math.min(r,g,b);

let h,s,l=(max+min)/2;

if(max===min){

h=s=0;

}else{

const d=max-min;

s=l>0.5
? d/(2-max-min)
: d/(max+min);

switch(max){

case r:

h=(g-b)/d+(g<b?6:0);

break;

case g:

h=(b-r)/d+2;

break;

case b:

h=(r-g)/d+4;

break;

}

h/=6;

}

return{

h:Math.round(h*360),

s:Math.round(s*100),

l:Math.round(l*100)

};

}
/* ===========================
   화면 갱신
=========================== */

function updateColor(){

    const hex = colorPicker.value;

    const rgb = hexToRgb(hex);

    const hsl = rgbToHsl(rgb.r, rgb.g, rgb.b);

    const alphaValueNum = alpha.value / 100;

    colorPreview.style.background =
        `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, ${alphaValueNum})`;

    hexCode.textContent = hex.toUpperCase();

    rgbCode.textContent =
        `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;

    hslCode.textContent =
        `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;

    alphaValue.textContent = alpha.value + "%";

}

/* ===========================
   최근 색상 표시
=========================== */

function renderHistory(){

    historyColors.innerHTML = "";

    historyList.forEach(function(color){

        const col = document.createElement("div");

        col.className = "col-2";

        col.innerHTML = `
            <div
                class="color-box"
                style="background:${color}"
                data-color="${color}">
            </div>
        `;

        historyColors.appendChild(col);

    });

    document
    .querySelectorAll("#historyColors .color-box")
    .forEach(function(box){

        box.onclick = function(){

            colorPicker.value = this.dataset.color;

            updateColor();

        };

    });

}

/* ===========================
   저장
=========================== */

document
.getElementById("saveColor")
.addEventListener("click",function(){

    const color = colorPicker.value.toUpperCase();

    historyList = historyList.filter(c=>c!==color);

    historyList.unshift(color);

    if(historyList.length>24){

        historyList.length=24;

    }

    localStorage.setItem(
        "colorHistory",
        JSON.stringify(historyList)
    );

    renderHistory();

});

/* ===========================
   기록 삭제
=========================== */

document
.getElementById("clearHistory")
.addEventListener("click",function(){

    historyList=[];

    localStorage.removeItem("colorHistory");

    renderHistory();

});

/* ===========================
   기본 색상
=========================== */

document
.getElementById("resetColor")
.addEventListener("click",function(){

    colorPicker.value="#007BFF";

    alpha.value=100;

    updateColor();

});

/* ===========================
   랜덤 색상
=========================== */

document
.getElementById("randomBtn")
.addEventListener("click",function(){

    const color="#" +
    Math.floor(Math.random()*16777215)
    .toString(16)
    .padStart(6,"0");

    colorPicker.value=color;

    updateColor();

});

/* ===========================
   복사
=========================== */

async function copyText(text){

    try{

        await navigator.clipboard.writeText(text);

        alert("복사되었습니다.");

    }catch{

        alert("복사에 실패했습니다.");

    }

}

document.getElementById("copyHex").onclick=function(){

    copyText(hexCode.textContent);

};

document.getElementById("copyRgb").onclick=function(){

    copyText(rgbCode.textContent);

};

document.getElementById("copyHsl").onclick=function(){

    copyText(hslCode.textContent);

};

document.getElementById("copyCss").onclick=function(){

    copyText(
`background:${hexCode.textContent};`
    );

};

/* ===========================
   기본 팔레트
=========================== */

document
.querySelectorAll("#presetColors .color-box")
.forEach(function(box){

    box.onclick=function(){

        colorPicker.value=this.dataset.color;

        updateColor();

    };

});

/* ===========================
   변경 이벤트
=========================== */

colorPicker.addEventListener("input",updateColor);

alpha.addEventListener("input",updateColor);

/* ===========================
   최초 실행
=========================== */

renderHistory();

updateColor();

</script>
